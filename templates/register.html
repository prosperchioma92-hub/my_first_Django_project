{% extends "base.html" %}

{%block content%}
{% if errors %}
{% for error in errors %}
<div>
    <h6>
        {{ error }}
    </h6>
</div>
{% endfor %}
{% endif%}
<form method="POST">  
    {% csrf_token %} 
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>
{%endblock content%}
