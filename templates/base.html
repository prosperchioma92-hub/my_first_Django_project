<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo — start your list</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F5F0;
    --ink:#1F2421;
    --moss:#4A6741;
    --clay:#C17A54;
    --line:#D8D3C8;
    --done:#A8A296;
    --card:#FFFDF9;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  .container{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:6vh 20px;
    line-height:1.5;
  }

  .app{
    width:100%;
    max-width:560px;
  }

  header{
    margin-bottom:36px;
  }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--moss);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
  }

  .eyebrow::before{
    content:"";
    width:6px;
    height:6px;
    background:var(--moss);
    border-radius:50%;
    display:inline-block;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(32px, 5vw, 44px);
    letter-spacing:-0.01em;
    color:var(--ink);
  }

  h1 em{
    font-style:italic;
    font-weight:500;
    color:var(--clay);
  }

  .sub{
    margin-top:8px;
    color:#5C574E;
    font-size:15px;
    max-width:38ch;
  }

  form{
    display:flex;
    gap:10px;
    margin-bottom:28px;
  }

  #task-input{
    flex:1;
    border:1.5px solid var(--line);
    background:var(--card);
    border-radius:10px;
    padding:14px 16px;
    font-family:'Inter', sans-serif;
    font-size:15px;
    color:var(--ink);
    outline:none;
    transition:border-color 0.15s ease, box-shadow 0.15s ease;
  }

  #task-input::placeholder{ color:#A39D8F; }

  #task-input:focus{
    border-color:var(--moss);
    box-shadow:0 0 0 3px rgba(74,103,65,0.12);
  }

  button.add{
    border:none;
    background:var(--ink);
    color:var(--paper);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:14px;
    padding:0 22px;
    border-radius:10px;
    cursor:pointer;
    transition:background 0.15s ease, transform 0.1s ease;
  }

  button.add:hover{ background:var(--moss); }
  button.add:active{ transform:scale(0.97); }

  .meta-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--done);
    letter-spacing:0.02em;
    margin-bottom:14px;
    padding:0 2px;
  }

  .filters{
    display:flex;
    gap:14px;
  }

  .filters button{
    background:none;
    border:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--done);
    cursor:pointer;
    padding:2px 0;
    border-bottom:1.5px solid transparent;
    transition:color 0.15s ease, border-color 0.15s ease;
  }

  .filters button.active,
  .filters button:hover{
    color:var(--ink);
    border-color:var(--clay);
  }

  ul#list{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  li.item{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--card);
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
    animation:rise 0.28s ease both;
  }

  @keyframes rise{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .check{
    flex-shrink:0;
    width:22px;
    height:22px;
    cursor:pointer;
  }

  .check svg{ width:22px; height:22px; display:block; }

  .check circle{
    fill:none;
    stroke:var(--line);
    stroke-width:1.5;
    transition:stroke 0.15s ease;
  }

  li.item:hover .check circle{ stroke:var(--moss); }

  .check path{
    fill:none;
    stroke:var(--moss);
    stroke-width:2.2;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:20;
    stroke-dashoffset:20;
    transition:stroke-dashoffset 0.28s ease;
  }

  li.item.done .check path{ stroke-dashoffset:0; }
  li.item.done .check circle{ stroke:var(--moss); fill:rgba(74,103,65,0.08); }

  .label{
    flex:1;
    font-size:15px;
    color:var(--ink);
    position:relative;
    word-break:break-word;
  }

  .label::after{
    content:"";
    position:absolute;
    left:0; right:100%;
    top:50%;
    height:1.5px;
    background:var(--done);
    transition:right 0.32s ease;
  }

  li.item.done .label{ color:var(--done); }
  li.item.done .label::after{ right:0; }

  .remove{
    flex-shrink:0;
    width:26px;
    height:26px;
    border:none;
    background:none;
    color:var(--done);
    font-size:16px;
    cursor:pointer;
    border-radius:6px;
    opacity:0;
    transition:opacity 0.15s ease, color 0.15s ease, background 0.15s ease;
  }

  li.item:hover .remove{ opacity:1; }
  .remove:hover{ color:#B0483A; background:rgba(176,72,58,0.08); }

  .empty{
    text-align:center;
    padding:48px 20px;
    color:var(--done);
  }

  .empty .glyph{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:22px;
    color:var(--clay);
    margin-bottom:6px;
  }

  .empty p{ font-size:14px; }

  @media (prefers-reduced-motion: reduce){
    li.item{ animation:none; }
    .check path, .label::after, .remove{ transition:none; }
  }
  nav{
    width: 100vw;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-around;
  }
</style>
</head>
<body>
    <nav>
        <h6>my logo</h6>
        <ul>
            <li><a href="{% url "home" %}">home</a></li>
            <li><a href="{% url "login" %}">login</a></li>
        </ul>
    </nav>
    
    <div class="container">
        {%block content %} 
        {% endblock content%}
    </div>

</body>
</html>
